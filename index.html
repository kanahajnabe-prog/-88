<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>محرك بحث طلبية 147</title>
    <style>
        /* إعدادات الخلفية والصفحة */
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* خلفية متدرجة ملفتة للنظر */
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        /* حاوية البحث المركزية */
        .main-wrapper {
            width: 90%;
            max-width: 850px;
            text-align: center;
            animation: fadeIn 1s ease-in-out;
        }

        h1 {
            color: white;
            font-size: 35px;
            margin-bottom: 30px;
            text-shadow: 2px 4px 10px rgba(0,0,0,0.3);
        }

        .search-container {
            position: relative;
            width: 100%;
        }

        /* مربع البحث المطور */
        .search-box {
            width: 100%;
            padding: 30px 40px;
            font-size: 30px;
            font-weight: bold;
            border: none;
            border-radius: 50px; /* شكل بيضاوي عصري */
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            outline: none;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: rgba(255, 255, 255, 0.95);
        }

        .search-box:focus {
            background: #fff;
            transform: scale(1.05);
            box-shadow: 0 20px 45px rgba(0,0,0,0.5);
        }

        /* نتائج البحث */
        .results-container {
            margin-top: 40px;
            max-height: 50vh;
            overflow-y: auto;
            padding: 10px;
            border-radius: 20px;
        }

        .item-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px); /* تأثير الزجاج الضبابي */
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: 0.3s;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .item-card:hover {
            background: rgba(255, 255, 255, 0.9);
            color: #1e3c72;
            transform: translateY(-5px);
        }

        .item-code {
            background: #ffcc00;
            color: #333;
            padding: 5px 15px;
            border-radius: 8px;
            font-weight: bold;
            font-family: monospace;
        }

        /* أنيميشن الدخول */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* التنبيه */
        #copyToast {
            visibility: hidden;
            background-color: #28a745;
            color: white;
            text-align: center;
            border-radius: 50px;
            padding: 15px 30px;
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-weight: bold;
            z-index: 1000;
        }

        #copyToast.show { visibility: visible; animation: fadeInUp 0.5s; }

        @keyframes fadeInUp {
            from { bottom: 0; opacity: 0; }
            to { bottom: 30px; opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <h1>📋 محرك بحث الأصناف - طلبية 147</h1>
        
        <div class="search-container">
            <input type="text" id="searchInput" class="search-box" placeholder="ابحث بالاسم أو الكود هنا..." autofocus>
        </div>

        <div id="results" class="results-container"></div>
    </div>

    <div id="copyToast">تم نسخ البيانات بنجاح! ✅</div>

    <script>

            {c:"992200", n:"شنينة طيبة بالنعناع 900 مل"},

            {c:"992500", n:"زبادي طيبة 150 غم (5+1 مجاناً)"},
            {c:"963600", n:"زبادي طيبة 3% دسم 180 غم"},
            {c:"902400", n:"زبادي طيبة 200 غم"},
            {c:"964100", n:"زبادي طيبة 3% دسم 700 غم"},

            {c:"992600", n:"زبادي المراعي 150 غم (5+1 مجاناً)"},
            {c:"904000", n:"زبادي المراعي 700 غم"},
            {c:"900940", n:"زبادي المراعي 1 كغم"},
            {c:"900890", n:"زبادي المراعي 1.7 كغم"},
            {c:"901030", n:"زبادي المراعي 3.5 كغم"},
            {c:"900460", n:"زبادي المراعي 5 كغم"},
            {c:"915000", n:"زبادي المراعي قليل الدسم 150 غم"},
            {c:"918000", n:"زبادي المراعي قليل الدسم 700 غم"},
            // ... (بقية الأصناف كما في الكود السابق)
        ];

        const searchInput = document.getElementById('searchInput');
        const resultsDiv = document.getElementById('results');
        const toast = document.getElementById('copyToast');

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                toast.className = "show";
                setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 2500);
            });
        }

        searchInput.addEventListener('input', (e) => {
            const filter = e.target.value.trim().toLowerCase();
            resultsDiv.innerHTML = '';

            if (filter === '') return;

            const filtered = database.filter(item => 
                item.n.toLowerCase().includes(filter) || 
                item.c.includes(filter)
            );

            filtered.forEach(item => {
                const div = document.createElement('div');
                div.className = 'item-card';
                div.innerHTML = `
                    <span>${item.n}</span>
                    <span class="item-code">${item.c}</span>
                `;
                div.onclick = () => copyToClipboard(`${item.n} ${item.c}`);
                resultsDiv.appendChild(div);
            });
        });
    </script>
</body>
</html>
