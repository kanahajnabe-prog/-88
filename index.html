            margin-top: 40px;

            overflow-y: auto;

            visibility: hidden;
            background-color: #28a745;
            color: white;
            text-align: center;
            border-radius: 50px;
            padding: 15px 30px;
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-weight: bold;
            z-index: 1000;
        }

        #copyToast.show { visibility: visible; animation: fadeInUp 0.5s; }

            from { bottom: 0; opacity: 0; }
            to { bottom: 30px; opacity: 1; }

        body, html {

            outline: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: #2c3e50;

            background: #ffffff;
            transform: scale(1.03);

        .search-box::placeholder {
            color: #95a5a6;

        .results-container {

            scrollbar-width: thin;
            scrollbar-color: #ffcc00 transparent;
        }

        .results-container::-webkit-scrollbar {
            width: 6px;
        }
        .results-container::-webkit-scrollbar-thumb {
            background-color: #ffcc00;
            border-radius: 10px;
        }

        .item-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 18px 25px;
            margin-bottom: 12px;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: 0.3s ease;
            color: white;
            animation: slideUp 0.4s ease-out;
        }

        .item-card:hover {
            background: rgba(255, 255, 255, 0.9);
            color: #0f2027;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .item-name {
            font-size: 20px;
            font-weight: 500;
            text-align: right;
            flex: 1;
        }

        .item-code {
            background: #ffcc00;
            color: #000;
            padding: 6px 15px;
            border-radius: 12px;
            font-weight: 800;
            font-family: 'Courier New', monospace;
            margin-right: 15px;
            font-size: 18px;
            box-shadow: 0 3px 6px rgba(0,0,0,0.2);
        }

        /* التنبيه (Toast) */
        #copyToast {
            visibility: hidden;
            background: #27ae60;
            color: white;
            padding: 15px 40px;
            border-radius: 50px;
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-weight: bold;
            font-size: 18px;
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        #copyToast.show { visibility: visible; animation: fadeInUp 0.4s forwards; }

        /* الحركات (Animations) */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInUp { 
            from { opacity: 0; bottom: 0; } 
            to { opacity: 1; bottom: 40px; } 
        }

        /* للأجهزة الصغيرة */
        @media (max-width: 600px) {
            .item-card { flex-direction: column; text-align: center; }
            .item-code { margin: 10px 0 0 0; }
            .item-name { text-align: center; }
        }

        const searchInput = document.getElementById('searchInput');
        const resultsDiv = document.getElementById('results');
        const toast = document.getElementById('copyToast');

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                toast.className = "show";
                setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 2500);
            });
        }

        searchInput.addEventListener('input', (e) => {
            const filter = e.target.value.trim().toLowerCase();
            resultsDiv.innerHTML = '';

            if (filter === '') return;

            const filtered = database.filter(item => 
                item.n.toLowerCase().includes(filter) || 
                item.c.includes(filter)
            );

            filtered.forEach(item => {
                const div = document.createElement('div');
                div.className = 'item-card';
                div.innerHTML = `
                    <span>${item.n}</span>
                    <span class="item-code">${item.c}</span>
                `;
                div.onclick = () => copyToClipboard(`${item.n} ${item.c}`);
                resultsDiv.appendChild(div);
            });
        });
    </script>
